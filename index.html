    <script>
        let humanScore = 0
        let computerScore = 0
            //Generate a random number from 0 to 1 and store it in variable RNG
            function getRandomTernaryNumber () {
                let RNG = 0.9;
            //Convert random number to 0, 1, or 2 evenly
                //If digit is 9, run random method again
                while (RNG >= 0.9) {
                    RNG = Math.random();
                }
                //If tenth place digit is 0, 1, or 2, convert to 0
                switch (RNG.toString().charAt(2)) {
                    case "0":
                    case "1":
                    case "2": 
                        return 0;
                    break;
                //If digit is 3, 4, or 5, convert to 1
                    case "3":
                    case "4":
                    case "5":
                        return 1;
                    break;
                //If digit is 6, 7, or 8, convert to 2
                    case "6":
                    case "7":
                    case "8":
                        return 2;
                    break;
                }
            }

            //convert computer choice number to rock with 0, paper with 1, and scissors with 2
            function getComputerChoice() {
                const randomTernaryNumber = getRandomTernaryNumber();
                switch (randomTernaryNumber) {
                    case 0: 
                    return "rock";
                    break;
                    case 1: 
                    return "paper";
                    break;
                    case 2: 
                    return "scissors";
                    break;
                }
            }

        //Prompt user for choice
        function getHumanChoice() {
            //convert human choice to all lowercase
            return prompt("Rock, paper, scissors, shoot!").toLowerCase();
        }
      
        let roundNumber = 1;

        function gameReset() {
            roundNumber = 1;
            roundPara.textContent = `Round: 1`;
            scorePara.textContent = `Player: 0, Computer: 0`;
            humanScore = 0;
            computerScore = 0;
        };

        let resetReady = false
        const resultsContainer = document.querySelector("#results-container");
        const roundPara = document.querySelector("#round-para");
        const scorePara = document.querySelector("#score-para");

        function playRound(choice) {
            if (resetReady) {
                roundNumber = 1;
                roundPara.textContent = `Round: 1`;
                scorePara.textContent = `Player: 0, Computer: 0`;
                humanScore = 0;
                computerScore = 0;
                while (resultsContainer.firstChild) {
                    resultsContainer.removeChild(resultsContainer.firstChild);
                }
                resetReady = false;
            }
            let roundWin = "draw";
            const resultsPara = document.createElement("p");
            //store human choice in string
            const humanChoice = choice.toLowerCase();
            //show human choice to player
            resultsPara.textContent = `You chose ${humanChoice}.`;
            //store computer choice in string
            const computerChoice = getComputerChoice();
            //if choices are identical, announce tie, do not increment score
            if (humanChoice == computerChoice) {
                roundWin = "draw";
            //if human chooses rock and computer chooses scissors, announce human win and increment human score by 1
            //if human chooses rock and computer chooses paper, announce computer win and increment computer score by 1
            } else if (humanChoice == "rock") {
                if (computerChoice == "scissors") {
                    humanScore++;
                    roundWin = "playerWin";
                } else {
                    computerScore++;
                    roundWin = "computerWin";
                }
            //if human chooses paper and computer chooses rock, announce human win and increment human score by 1
            //if human chooses paper and computer chooses scissors, announce computer win and increment computer score by 1
            } else if (humanChoice == "paper") {
                if (computerChoice == "rock") {
                    humanScore++;
                    roundWin = "playerWin";
                } else {
                    computerScore++;
                    roundWin = "computerWin";             }
            //if human chooses scissors and computer chooses paper, announce human win and increment human score by 1
            //if human chooses scissors and computer chooses rock, announce computer win and increment computer score by 1
            } else if (humanChoice == "scissors") {
                if (computerChoice == "paper") {
                    humanScore++;
                    roundWin = "playerWin"
                } else {
                    computerScore++;
                    roundWin = "computerWin"
                }
            }
            //return the total score
            if (roundWin == "playerWin") {
                resultsPara.textContent = `You chose ${humanChoice}. The computer chose ${computerChoice}. You win!`;
            } else if (roundWin == "computerWin") {
                resultsPara.textContent = `You chose ${humanChoice}. The computer chose ${computerChoice}. The computer wins!`;
            } else if (roundWin == "draw") {
                resultsPara.textContent = `You chose ${humanChoice}. The computer chose ${computerChoice}. It's a draw!`;
            }
            resultsContainer.insertBefore(resultsPara, resultsContainer.firstChild);
            scorePara.textContent = `Player: ${humanScore}, Computer: ${computerScore}`;
            if (roundNumber == 5) {
                if (humanScore > computerScore) {
                    roundPara.textContent = `You win the game!`;
                } else if (computerScore > humanScore) {
                    roundPara.textContent = `The computer wins the game!`;
                } else {
                    roundPara.textContent = `The game is a draw!`;
                };
                resetReady = true;
            } else {
                roundNumber ++;
                roundPara.textContent = `Round: ${roundNumber}`;
            };
        }

            let sum = 0;
            const evenArray = array.filter((item => item % 2 == 0));

            arr.sort((a, b) => {
                if (a > b) return -1;
                if (a = b) return 0;

        let nonUnique = [0, 0, 0, 1, 2, 3, 3, 3, 3, 4, 5, 5];

        function unique(arr) {
            let uniques = arr.slice();
            for (let i = 0; i < uniques.length ; i++){
                if (uniques.findIndex(item => item == uniques[i]) !== uniques.findLastIndex(item => item == uniques[i])){
